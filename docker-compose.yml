version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tribal-match-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tribal_match
      POSTGRES_USER: postgres
      # POSTGRES_PASSWORD: postgres
      POSTGRES_PASSWORD: newpassword
    ports:
      - "5433:5432"
    volumes:
      - tribal_match_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tribal_match"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  tribal_match_pgdata:
